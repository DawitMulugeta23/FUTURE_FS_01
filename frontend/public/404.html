<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Redirecting...</title>
    <script>
      // Get the current URL path and hash
      var path = window.location.pathname;
      var hash = window.location.hash;
      
      // Build the redirect URL - this will take the user back to the root
      // and let React Router handle the routing
      var redirectUrl = '/';
      
      // If there's a path that's not just '/', add it as a hash route
      if (path !== '/' && path !== '/index.html') {
        redirectUrl = '/#' + path;
      }
      
      // Add hash fragment if it exists
      if (hash) {
        redirectUrl += hash;
      }
      
      // Perform the redirect
      window.location.replace(redirectUrl);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
